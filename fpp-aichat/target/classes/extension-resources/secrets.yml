# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                      FakePlayerPlugin - secrets.yml                      ║
# ║                            AI API Keys & Secrets                         ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# This file contains sensitive API keys and secrets for AI-powered bot conversations.
# NEVER commit this file to version control or share it publicly.
#
# ── AI Provider API Keys ──────────────────────────────────────────────────────
# Leave keys blank ("") to disable that provider.
# Only one provider needs to be configured — bots will use the first available key.
#
# Model Selection:
# - Leave "model" blank ("") to randomly select from available models for that provider
# - Or specify a model name to always use that model (e.g., "gpt-4", "claude-3-opus-20240229")

# OpenAI (ChatGPT) API
# Get your key at: https://platform.openai.com/api-keys
# Available models: gpt-4-turbo, gpt-4, gpt-3.5-turbo
openai:
  api-key: ""
  model: ""
  # Optional: custom endpoint (leave blank for default)
  endpoint: ""

# Microsoft Copilot API (Azure OpenAI)
# Get your key at: https://portal.azure.com
copilot:
  api-key: ""
  model: ""
  endpoint: ""
  deployment-name: ""

# Groq API (Fast inference)
# Get your key at: https://console.groq.com/keys
# Available models: mixtral-8x7b-32768, llama2-70b-4096
groq:
  api-key: ""
  model: ""
  # Optional: custom endpoint
  endpoint: ""

# Anthropic Claude API
# Get your key at: https://console.anthropic.com/
# Available models: claude-3-opus-20240229, claude-3-sonnet-20240229, claude-3-haiku-20240307
anthropic:
  api-key: ""
  model: ""
  endpoint: ""

# Google Gemini API
# Get your key at: https://makersuite.google.com/app/apikey
# Available models: gemini-pro, gemini-pro-vision
google:
  api-key: ""
  model: ""
  endpoint: ""

# Ollama (Local/Self-hosted)
# No API key needed — just set the endpoint to your Ollama server
# Leave model blank to randomly select from available models on your server
ollama:
  enabled: false
  endpoint: "http://localhost:11434"
  model: ""

# Custom OpenAI-compatible API
# For any service that implements the OpenAI API format
custom:
  enabled: false
  api-key: ""
  model: ""
  endpoint: ""

