enabled: true

random:
  min: 20
  max: 200

ping:
  enabled: false
  min: 20
  max: 200
  variability: 8
  update-interval: 40
  latency-effect: true
  behavior-effect: true
  packet-lag-effect: true
  max-behavior-skip-ticks: 8
  max-packet-lag-ticks: 20
  spike-chance: 0.04
  spike-min: 200
  spike-max: 600
  join-ramp-ticks: 60
  fake-lag:
    enabled: true
    min-ping: 150
    max-freeze-ticks: 20
    movement-freeze: true
    damage-knockback: true
    knockback-horizontal: 0.45
    knockback-vertical: 0.35

permissions:
  base: fpp.ping
  set: fpp.ping.set
  random: fpp.ping.random
  bulk: fpp.ping.bulk

messages:
  prefix: "&8[&bFPP Ping&8]&r "
