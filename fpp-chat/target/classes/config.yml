enabled: true

permissions:
  command: fpp.chat

fake-chat:
  enabled: false
  debug: false
  require-player-online: true
  chance: 0.75
  interval:
    min: 5
    max: 10
  typing-delay: true
  activity-variation: true
  history-size: 5
  stagger-interval: 3
  burst-chance: 0.12
  burst-delay:
    min: 2
    max: 5
  bot-to-bot:
    enabled: true
    reply-chance: 0.35
    chain-chance: 0.40
    max-chain: 3
    cooldown: 8
    delay:
      min: 4
      max: 14
  reply-to-mentions: true
  mention-reply-chance: 0.65
  reply-delay:
    min: 2
    max: 8
  remote-format: "<yellow>{name}<dark_gray>: <white>{message}"
  event-triggers:
    enabled: true
    on-player-join:
      enabled: true
      chance: 0.40
      delay:
        min: 2
        max: 6
    on-death:
      enabled: true
      players-only: false
      chance: 0.30
      delay:
        min: 1
        max: 4
    on-player-leave:
      enabled: true
      chance: 0.30
      delay:
        min: 1
        max: 4
    on-advancement:
      enabled: true
      chance: 0.45
      delay:
        min: 1
        max: 5
    on-first-join:
      enabled: true
      chance: 0.70
    on-kill:
      enabled: true
      chance: 0.35
      delay:
        min: 1
        max: 4
    on-high-level:
      enabled: true
      min-level: 30
      chance: 0.35
      delay:
        min: 1
        max: 5
  on-player-chat:
    enabled: false
    chance: 0.25
    max-bots: 1
    ignore-short: true
    ignore-commands: true
    mention-player: 0.50
    delay:
      min: 2
      max: 8
  keyword-reactions:
    enabled: false
    keywords: {}
